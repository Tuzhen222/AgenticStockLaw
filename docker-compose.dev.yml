# Full stack development with hot reload
# Usage: docker-compose -f docker-compose.dev.yml up -d
# Or use: ./run.sh (one command)

services:
  # ================== DATABASE & STORAGE ==================
  postgres:
    image: postgres:16-alpine
    container_name: agentic_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentic_stock_law
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentic-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentic_qdrant
    ports:
      - "6333:6333" # HTTP/Dashboard
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - agentic-network

  minio:
    image: minio/minio:latest
    container_name: agentic_minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agentic-network

  redis:
    image: redis:7-alpine
    container_name: agentic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentic-network

  # ================== AI GATEWAY & AGENTS ==================
  ai-gateway:
    container_name: agentic_ai_gateway
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: uvicorn ai.gateway:create_app --factory --host 0.0.0.0 --port 9200 --reload
    restart: always
    environment:
      - ORCHESTRATOR_URL=http://ai-orchestrator:9100
      - KNOWLEDGE_AGENT_URL=http://ai-knowledge:9101
      - VALIDATION_AGENT_URL=http://ai-validation:9102
      - REGULATORY_AGENT_URL=http://ai-regulatory:9103
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - TRITON_URL=triton-gpu:8001
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./ai/.env
    volumes:
      - ./ai:/app/ai
    ports:
      - "9200:9200"
    depends_on:
      - qdrant
      - redis
      - ai-knowledge
      - ai-validation
      - ai-regulatory
    networks:
      - agentic-network

  ai-orchestrator:
    container_name: agentic_ai_orchestrator
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main orchestrator
    restart: always
    environment:
      - KNOWLEDGE_AGENT_URL=http://ai-knowledge:9101
      - VALIDATION_AGENT_URL=http://ai-validation:9102
      - REGULATORY_AGENT_URL=http://ai-regulatory:9103
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./ai/.env
    volumes:
      - ./ai:/app/ai
    ports:
      - "127.0.0.1:9100:9100"
    depends_on:
      - redis
      - ai-knowledge
      - ai-validation
      - ai-regulatory
    networks:
      - agentic-network

  ai-knowledge:
    container_name: agentic_ai_knowledge
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main knowledge
    restart: always
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - TRITON_URL=triton-gpu:8001
      - VALIDATION_AGENT_URL=http://ai-validation:9102
      - REGULATORY_AGENT_URL=http://ai-regulatory:9103
    env_file:
      - ./ai/.env
    volumes:
      - ./ai:/app/ai
    ports:
      - "127.0.0.1:9101:9101"
    depends_on:
      - qdrant
    networks:
      - agentic-network

  ai-validation:
    container_name: agentic_ai_validation
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main validation
    restart: always
    env_file:
      - ./ai/.env
    volumes:
      - ./ai:/app/ai
    ports:
      - "127.0.0.1:9102:9102"
    networks:
      - agentic-network

  ai-regulatory:
    container_name: agentic_ai_regulatory
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main regulatory_update
    restart: always
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - TRITON_URL=triton-gpu:8001
    env_file:
      - ./ai/.env
    volumes:
      - ./ai:/app/ai
    ports:
      - "127.0.0.1:9103:9103"
    depends_on:
      - qdrant
    networks:
      - agentic-network

  # ================== BACKEND (FastAPI) ==================
  backend:
    container_name: agentic_backend
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: always
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/agentic_stock_law
      - SECRET_KEY=dev-secret-key-not-for-production
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080"]
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - AI_GATEWAY_URL=http://ai-gateway:9200
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai-gateway:
        condition: service_started
    networks:
      - agentic-network

  # ================== FRONTEND (Next.js) ==================
  frontend:
    container_name: agentic_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    restart: always
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - agentic-network

  # ================== TRITON CPU (Optional) ==================
  triton-cpu:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: agentic_triton_cpu
    command: tritonserver --model-repository=/models --http-port=8000 --grpc-port=8001 --metrics-port=8002 --exit-on-error=false
    ports:
      - "8003:8000" # HTTP
      - "8001:8001" # gRPC
      - "8002:8002" # Metrics
    volumes:
      - ./triton_server/model_repository:/models:ro
    restart: unless-stopped
    networks:
      - agentic-network
    profiles:
      - with-triton-cpu

  # ================== TRITON GPU ==================
  triton-gpu:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: agentic_triton_gpu
    command: tritonserver --model-repository=/models --http-port=8000 --grpc-port=8001 --metrics-port=8002
    ports:
      - "8003:8000" # HTTP
      - "8001:8001" # gRPC
      - "8002:8002" # Metrics
    volumes:
      - ./triton_server/model_repository:/models:ro
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - agentic-network
    profiles:
      - with-triton-gpu

networks:
  agentic-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  redis_data:


