# Production deployment
# Usage: docker-compose up -d --build

services:
  # ================== DATABASE & STORAGE ==================
  postgres:
    image: postgres:16-alpine
    container_name: agentic_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_stock_law}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentic-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agentic_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agentic-network

  minio:
    image: minio/minio:latest
    container_name: agentic_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agentic-network

  # ================== AI GATEWAY & AGENTS ==================
  ai-gateway:
    container_name: agentic_ai_gateway
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: uvicorn ai.gateway:create_app --factory --host 0.0.0.0 --port 9200
    restart: always
    environment:
      - ORCHESTRATOR_URL=http://ai-orchestrator:9100
      - KNOWLEDGE_AGENT_URL=http://ai-knowledge:9101
      - VALIDATION_AGENT_URL=http://ai-validation:9102
      - REGULATORY_AGENT_URL=http://ai-regulatory:9103
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - TRITON_URL=triton-gpu:8001
    env_file:
      - ./ai/.env
    ports:
      - "9200:9200"
    depends_on:
      - qdrant
      - ai-knowledge
      - ai-validation
      - ai-regulatory
    networks:
      - agentic-network

  ai-orchestrator:
    container_name: agentic_ai_orchestrator
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main orchestrator
    restart: always
    environment:
      - KNOWLEDGE_AGENT_URL=http://ai-knowledge:9101
      - VALIDATION_AGENT_URL=http://ai-validation:9102
      - REGULATORY_AGENT_URL=http://ai-regulatory:9103
    env_file:
      - ./ai/.env
    ports:
      - "127.0.0.1:9100:9100"
    depends_on:
      - ai-knowledge
      - ai-validation
      - ai-regulatory
    networks:
      - agentic-network

  ai-knowledge:
    container_name: agentic_ai_knowledge
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main knowledge
    restart: always
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - TRITON_URL=triton-gpu:8001
      - VALIDATION_AGENT_URL=http://ai-validation:9102
      - REGULATORY_AGENT_URL=http://ai-regulatory:9103
    env_file:
      - ./ai/.env
    ports:
      - "127.0.0.1:9101:9101"
    depends_on:
      - qdrant
    networks:
      - agentic-network

  ai-validation:
    container_name: agentic_ai_validation
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main validation
    restart: always
    env_file:
      - ./ai/.env
    ports:
      - "127.0.0.1:9102:9102"
    networks:
      - agentic-network

  ai-regulatory:
    container_name: agentic_ai_regulatory
    build:
      context: .
      dockerfile: ai/Dockerfile
    command: python -m ai.main regulatory_update
    restart: always
    env_file:
      - ./ai/.env
    ports:
      - "127.0.0.1:9103:9103"
    networks:
      - agentic-network

  # ================== BACKEND (FastAPI) ==================
  backend:
    container_name: agentic_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-agentic_stock_law}
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080"]
      - MINIO_HOST=agentic_minio
      - MINIO_PORT=9000
      - AI_GATEWAY_URL=http://ai-gateway:9200
    volumes:
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ai-gateway:
        condition: service_started
    networks:
      - agentic-network

  # ================== FRONTEND (Next.js) ==================
  frontend:
    container_name: agentic_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - agentic-network

  # ================== NGINX (Optional) ==================
  nginx:
    image: nginx:alpine
    container_name: agentic_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - agentic-network
    profiles:
      - with-nginx

  # ================== TRITON CPU ==================
  triton-cpu:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: agentic_triton_cpu
    command: tritonserver --model-repository=/models --http-port=8000 --grpc-port=8001 --metrics-port=8002 --exit-on-error=false
    restart: always
    ports:
      - "8003:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./triton_server/model_repository:/models:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v2/health/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agentic-network
    profiles:
      - with-triton-cpu

  # ================== TRITON GPU ==================
  triton-gpu:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    container_name: agentic_triton_gpu
    command: tritonserver --model-repository=/models --http-port=8000 --grpc-port=8001 --metrics-port=8002
    restart: always
    ports:
      - "8003:8000"
      - "8001:8001"
      - "8002:8002"
    volumes:
      - ./triton_server/model_repository:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v2/health/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agentic-network
    profiles:
      - with-triton-gpu

networks:
  agentic-network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
