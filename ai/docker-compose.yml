services:
  # AI Gateway - Public Entry Point
  gateway:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    command: python -m ai.main gateway
    ports:
      - "9200:9200" # Public - Backend connects here
    env_file:
      - .env
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:9100
    depends_on:
      - orchestrator
    restart: unless-stopped
    networks:
      - agent-network

  # MCP Tools (Internal - debug ports on localhost only)
  retrieve:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    command: python -m ai.main retrieve
    ports:
      - "127.0.0.1:8100:8100" # Debug only - not exposed publicly
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - TRITON_URL=triton-gpu:8001
    restart: unless-stopped
    networks:
      - agent-network

  rerank:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    command: python -m ai.main rerank
    ports:
      - "127.0.0.1:8101:8101" # Debug only
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - agent-network

  # A2A Agents (Internal - debug ports on localhost only)
  orchestrator:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    command: python -m ai.main orchestrator
    ports:
      - "127.0.0.1:9100:9100" # Debug only
    env_file:
      - .env
    environment:
      - KNOWLEDGE_AGENT_URL=http://knowledge:9101
      - VALIDATION_AGENT_URL=http://validation:9102
      - REGULATORY_UPDATE_AGENT_URL=http://regulatory_update:9103
    depends_on:
      - knowledge
      - validation
      - regulatory_update
    restart: unless-stopped
    networks:
      - agent-network

  knowledge:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    command: python -m ai.main knowledge
    ports:
      - "127.0.0.1:9101:9101" # Debug only
    env_file:
      - .env
    environment:
      - VALIDATION_AGENT_URL=http://validation:9102
      - REGULATORY_UPDATE_AGENT_URL=http://regulatory_update:9103
      - RETRIEVE_MCP_URL=http://retrieve:8100
      - RERANK_MCP_URL=http://rerank:8101
    depends_on:
      - retrieve
      - rerank
      - validation
      - regulatory_update
    restart: unless-stopped
    networks:
      - agent-network

  validation:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    command: python -m ai.main validation
    ports:
      - "127.0.0.1:9102:9102" # Debug only
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - agent-network

  regulatory_update:
    build:
      context: ..
      dockerfile: ai/Dockerfile
    command: python -m ai.main regulatory_update
    ports:
      - "127.0.0.1:9103:9103" # Debug only
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - agent-network

  # Infrastructure Services
  # Triton with GPU - use: docker-compose --profile gpu up
  triton-gpu:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    command: tritonserver --model-repository=/models --http-port=8000 --grpc-port=8001 --metrics-port=8002
    ports:
      - "8000:8000" # HTTP
      - "8001:8001" # gRPC
      - "8002:8002" # Metrics
    volumes:
      - ../triton_server/model_repository:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped
    networks:
      - agent-network
    profiles:
      - gpu

  # Triton without GPU (CPU only) - use: docker-compose --profile cpu up
  triton-cpu:
    image: nvcr.io/nvidia/tritonserver:24.08-py3
    command: tritonserver --model-repository=/models --http-port=8000 --grpc-port=8001 --metrics-port=8002
    ports:
      - "8000:8000" # HTTP
      - "8001:8001" # gRPC
      - "8002:8002" # Metrics
    volumes:
      - ../triton_server/model_repository:/models:ro
    restart: unless-stopped
    networks:
      - agent-network
    profiles:
      - cpu

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # HTTP
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

volumes:
  qdrant_storage:
