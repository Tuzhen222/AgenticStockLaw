version: '3.8'

services:
  triton:
    build: .
    ports:
      - "8000:8000" # HTTP
      - "8001:8001" # gRPC
      - "8002:8002" # Metrics
    volumes:
      # Mount model_repository for development (optional - remove for production)
      - ./model_repository:/models
    # GPU support (requires nvidia-docker2 or Docker 19.03+ with NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    shm_size: '8gb' # Shared memory for GPU operations
    stdin_open: true
    tty: true
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/v2/health/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
